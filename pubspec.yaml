name: db_lens
description: A Flutter debug tool for inspecting SQLite (sqflite) and SharedPreferences directly on device. Built for QA and developers — no external tools or adb needed.
version: 0.0.3
repository: https://github.com/hzeee18/db_lens
homepage: https://github.com/hzeee18/db_lens

screenshots:
  - description: 'SQLite browser'
    path: screenshots/preview_sqlite.png
  - description: 'Pagination'
    path: screenshots/preview_pagination.png
  - description: 'SharedPreferences inspector'
    path: screenshots/preview_sharedprefs.png

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0